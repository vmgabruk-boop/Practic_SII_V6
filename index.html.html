<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логистический терминал - Учет грузовиков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .main-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f9f9ff;
        }
        
        input[type="file"] {
            margin: 15px 0;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .result-area {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .truck-count {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            text-align: center;
        }
        
        #resultImage {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .history-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .history-item:hover {
            background: #f0f0ff;
        }
        
        .history-time {
            font-size: 12px;
            color: #888;
        }
        
        .history-count {
            font-weight: bold;
            color: #667eea;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .badge-image { background: #4caf50; color: white; }
        .badge-video { background: #ff9800; color: white; }
        
        @media (max-width: 768px) {
            .main-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚛 Логистический терминал - Система учета грузовиков</h1>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Всего грузовиков</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statAvg">0</div>
                <div class="stat-label">Среднее за запрос</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat24h">0</div>
                <div class="stat-label">За 24 часа</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statRequests">0</div>
                <div class="stat-label">Всего запросов</div>
            </div>
        </div>
        
        <div class="main-panel">
            <div class="card">
                <h2>📤 Загрузка и обработка</h2>
                <div class="upload-area">
                    <p>📸 Загрузите изображение или видео грузовиков</p>
                    <input type="file" id="fileInput" accept="image/*,video/*">
                    <div class="btn-group">
                        <button onclick="processFile()">🚀 Запустить обработку</button>
                        <button onclick="clearResult()">🗑 Очистить результат</button>
                    </div>
                    <div id="processingStatus"></div>
                </div>
                <div class="result-area" id="resultArea" style="display: none;">
                    <div class="truck-count" id="truckCountDisplay">0</div>
                    <div id="resultDetails"></div>
                    <img id="resultImage" style="display: none;">
                </div>
            </div>
            
            <div class="card">
                <h2>📊 Статистика и отчеты</h2>
                <div class="btn-group">
                    <button onclick="generateReport('pdf')">📄 PDF отчет</button>
                    <button onclick="generateReport('excel')">📊 Excel отчет</button>
                    <button onclick="loadHistory()">🔄 Обновить историю</button>
                    <button onclick="clearHistory()" class="btn-danger">🗑 Очистить историю</button>
                </div>
                <div id="historyList">
                    <div style="text-align: center; color: #888; padding: 20px;">Загрузка истории...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
